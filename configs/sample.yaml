# Quick E2E with real daily data: fetch first with scripts/fetch_sample_data.py (see README).
experiment_mode: "universe"

symbols:
  - "MSTR"
  - "IBIT"
  - "COIN"
  - "QQQ"

target_symbol: "MSTR"
timeframe: "daily"
lookback: 32
min_coverage_symbols: 3

label_mode: "cross_sectional_return"
sector_map_path: "configs/sector_map.yaml"
store: "csv"
loss: "mse"

data_source: "rest"
use_adjusted_daily: true
use_adjusted_weekly: true
use_adjusted_monthly: true
intraday_month: null
intraday_extended_hours: false
intraday_outputsize: "full"
daily_outputsize: "full"
cache_dir: "data"

# Walk-forward: small folds for fast runs; compatible with IBIT history (~2024+ listing).
train_bars: 150
val_bars: 30
test_bars: 30
step_bars: 30

# Smaller ranker for quick iterations
d_model: 32
nhead: 2
num_temporal_layers: 1
num_cross_layers: 1
dim_feedforward: 64
dropout: 0.1
epochs: 2
batch_size: 16
learning_rate: 0.0005

device: "auto"
seed: 42
artifacts_dir: "artifacts"
synthetic_n_bars: 600
