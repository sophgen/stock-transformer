# Two-ticker universe: IBIT + MSTR OHLCV in the panel; emphasize MSTR in metrics via target_symbol.
# The ranker is trained on both names; MSTR’s score uses IBIT history via the cross-sectional stack.
# Labels are forward simple returns (t → t+1); implied next price is close[t] * (1 + return).
experiment_mode: "universe"

symbols:
  - "MSTR"
  - "IBIT"

target_symbol: "MSTR"
timeframe: "daily"
lookback: 32

# Both tickers must be live at t and t+1.
min_coverage_symbols: 2

# Per-symbol forward return targets (not peer-demeaned). Alternative: cross_sectional_return vs IBIT.
label_mode: "raw_return"

sector_map_path: "configs/sector_map.yaml"
store: "csv"
loss: "mse"

data_source: "rest"
use_adjusted_daily: true
use_adjusted_weekly: true
use_adjusted_monthly: true
intraday_month: null
intraday_extended_hours: false
intraday_outputsize: "full"
daily_outputsize: "full"
cache_dir: "data"

# Shorter folds: IBIT daily history is shorter than MSTR.
train_bars: 150
val_bars: 30
test_bars: 30
step_bars: 30

d_model: 32
nhead: 2
num_temporal_layers: 1
num_cross_layers: 1
dim_feedforward: 64
dropout: 0.1
epochs: 4
batch_size: 16
learning_rate: 0.0005

device: "auto"
seed: 42
artifacts_dir: "artifacts"
synthetic_n_bars: 600
